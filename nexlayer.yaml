application:
  name: ente
  pods:
  - name: app
    image: ghcr.io/ente-io/museum:latest
    path: /
    servicePorts:
    - 8080
    vars:
      ENTE_DB_HOST: postgres.pod
      ENTE_DB_NAME: ente_db
      ENTE_DB_USER: pguser
      ENTE_DB_PASSWORD: pgpassword
  - name: postgres
    image: mirror.gcr.io/library/postgres:16-alpine
    servicePorts:
    - 5432
    vars:
      POSTGRES_DB: ente_db
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpassword
    volumes:
    - name: ente-db
      mountPath: /var/lib/postgresql/data
      size: 10Gi
